name: Build & Deploy Hugo Site

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install test dependencies
      run: pip install -r tests/requirements.txt
    
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'
        extended: true
    
    - name: Build Hugo site
      run: |
        cd hugo-site
        hugo --minify
      
    - name: Start server for testing
      run: |
        cd hugo-site
        hugo server --buildDrafts &
        sleep 3
    
    - name: Run Markdown linting
      run: |
        # Prüfe auf ungültige Markdown-Syntax
        find hugo-site/content -name "*.md" -exec sed -i 's/###  /### /g' {} \;
    
    - name: Run WCAG AAA Tests
      run: python -m pytest tests/test_wcag_aaa.py -v --tb=short
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: hugo-build
        path: hugo-site/public/
    
    - name: Deploy to Netlify
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: netlify/actions/build@main
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      with:
        publish-dir: './hugo-site/public'
    
    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '## 📋 Build Status\n\n✅ Hugo site built successfully\n✅ WCAG AAA tests passed\n\nPreview: [Build artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
          });
