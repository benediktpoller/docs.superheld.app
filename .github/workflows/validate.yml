name: Link & Content Validation

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly auf Sonntag

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'
        extended: true
    
    - name: Build Hugo site
      run: |
        cd hugo-site
        hugo --minify
    
    - name: Check for broken links
      uses: lycheeverse/lychee-action@v1.9.1
      with:
        args: ./hugo-site/public --offline
      
    - name: Validate HTML
      run: |
        # Installière HTML Validator
        npm install -g html-validator-cli
        # Validiere alle HTML Dateien
        find ./hugo-site/public -name "*.html" -exec echo "Checking {}" \; -exec html-validator --file {} \; || true
    
    - name: Check Markdown files
      run: |
        echo "Prüfe Markdown-Syntax..."
        # Notiere ungültige Überschriften
        grep -r "^##  " hugo-site/content/ || true
        # Notiere fehlende Alt-Text in Bildern (grundlegend)
        grep -r "!\[]\(" hugo-site/content/ || echo "Keine Bilder ohne Alt-Text gefunden"
    
    - name: Check for duplicate content
      run: |
        echo "Prüfe auf Duplikate..."
        # Finde Dateien mit gleichem Namen
        find hugo-site/content -type f -name "*.md" | sort | uniq -d || echo "Keine Duplikate"
    
    - name: Report validation results
      if: always()
      run: |
        echo "✅ Validierung abgeschlossen"
        echo "- HTML validiert"
        echo "- Markdown überprüft"
        echo "- Links kontrolliert"
