[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Old Hugo /docs/ URLs → new English paths
[[redirects]]
  from = "/docs/einfuehrung/*"
  to = "/getting-started/:splat"
  status = 301

[[redirects]]
  from = "/docs/experten/*"
  to = "/experts/:splat"
  status = 301

[[redirects]]
  from = "/docs"
  to = "/"
  status = 301

# Old Umlaut URLs
[[redirects]]
  from = "/docs/einführung/*"
  to = "/getting-started/:splat"
  status = 301

[[redirects]]
  from = "/docs/einf%C3%BChrung/*"
  to = "/getting-started/:splat"
  status = 301

# Old flat Hugo aliases
[[redirects]]
  from = "/docs/apps"
  to = "/experts/apps/"
  status = 301

[[redirects]]
  from = "/docs/faq"
  to = "/getting-started/faq/"
  status = 301

[[redirects]]
  from = "/docs/intro"
  to = "/getting-started/intro/"
  status = 301

[[redirects]]
  from = "/docs/konfiguration"
  to = "/experts/configuration/"
  status = 301

[[redirects]]
  from = "/docs/privacy-sicherheit"
  to = "/experts/privacy-security/"
  status = 301

[[redirects]]
  from = "/docs/migration"
  to = "/experts/migration/"
  status = 301

[[redirects]]
  from = "/docs/use-cases"
  to = "/experts/use-cases/"
  status = 301

[[redirects]]
  from = "/docs/nutzung"
  to = "/getting-started/usage/"
  status = 301

[[redirects]]
  from = "/docs/screenshots"
  to = "/experts/screenshots/"
  status = 301

# Old German URL paths → new English paths
[[redirects]]
  from = "/einfuehrung/*"
  to = "/getting-started/:splat"
  status = 301

[[redirects]]
  from = "/experten/*"
  to = "/experts/:splat"
  status = 301
