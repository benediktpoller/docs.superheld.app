<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="12" y="12" width="336" height="696" rx="28"/>
    </clipPath>
  </defs>
  <!-- Phone body -->
  <rect width="360" height="720" rx="40" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <g clip-path="url(#screenClip)">
    <rect x="12" y="12" width="336" height="696" fill="url(#screenBg)"/>
    <!-- Status bar -->
