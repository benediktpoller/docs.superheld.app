    <!-- Header -->
    <text x="30" y="86" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="600" letter-spacing="-0.3">Kindersicherung</text>
    <line x1="30" y1="102" x2="330" y2="102" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Profile Cards -->
