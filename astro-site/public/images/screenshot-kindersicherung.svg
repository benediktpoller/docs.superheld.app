    <text x="66" y="194" fill="#a78bfa" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" text-anchor="middle">L</text>
    <text x="100" y="180" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="500">Lena</text>
    <text x="100" y="198" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="12">iPad · Schulprofil aktiv</text>
    <rect x="252" y="174" width="62" height="26" rx="13" fill="rgba(52,199,89,0.15)"/>
    <text x="283" y="192" fill="#34c759" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500" text-anchor="middle">Online</text>

    <!-- Child 2 -->
    <rect x="30" y="240" width="300" height="80" rx="16" fill="rgba(255,255,255,0.06)"/>
    <circle cx="66" cy="280" r="22" fill="rgba(245,158,11,0.3)"/>
    <text x="66" y="286" fill="#fbbf24" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" text-anchor="middle">M</text>
    <text x="100" y="272" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="500">Max</text>
    <text x="100" y="290" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="12">iPhone · Freizeitprofil aktiv</text>
    <rect x="252" y="266" width="62" height="26" rx="13" fill="rgba(255,149,0,0.15)"/>
    <text x="283" y="284" fill="#ff9500" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500" text-anchor="middle">30 Min</text>

    <!-- Zeitlimits Section -->
    <text x="30" y="358" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="0.5">HEUTIGE BILDSCHIRMZEIT</text>

    <rect x="30" y="374" width="300" height="100" rx="16" fill="rgba(255,255,255,0.06)"/>
    <!-- Progress bar Lena -->
    <text x="50" y="400" fill="rgba(245,245,247,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Lena</text>
    <rect x="50" y="410" width="200" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="50" y="410" width="80" height="6" rx="3" fill="#a78bfa"/>
    <text x="265" y="418" fill="rgba(245,245,247,0.5)" font-family="-apple-system,system-ui,sans-serif" font-size="11">45m / 2h</text>
    <!-- Progress bar Max -->
    <text x="50" y="446" fill="rgba(245,245,247,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Max</text>
    <rect x="50" y="456" width="200" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="50" y="456" width="150" height="6" rx="3" fill="#fbbf24"/>
    <text x="265" y="464" fill="rgba(245,245,247,0.5)" font-family="-apple-system,system-ui,sans-serif" font-size="11">1h30 / 2h</text>

    <!-- Recent Requests -->
    <text x="30" y="514" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="0.5">FREIGABE-ANFRAGEN</text>

    <rect x="30" y="530" width="300" height="56" rx="12" fill="rgba(255,149,0,0.08)" stroke="rgba(255,149,0,0.2)" stroke-width="1"/>
    <text x="50" y="554" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Max möchte youtube.com öffnen</text>
    <text x="50" y="572" fill="rgba(245,245,247,0.35)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Vor 2 Minuten</text>
    <rect x="258" y="546" width="58" height="28" rx="14" fill="#34c759"/>
    <text x="287" y="565" fill="#fff" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">OK</text>

    <rect x="30" y="598" width="300" height="56" rx="12" fill="rgba(255,255,255,0.04)"/>
    <text x="50" y="622" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Lena: tiktok.com blockiert</text>
    <text x="50" y="640" fill="rgba(245,245,247,0.35)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Vor 15 Minuten · Automatisch</text>
    <rect x="258" y="614" width="58" height="28" rx="14" fill="rgba(255,255,255,0.1)"/>
    <text x="287" y="633" fill="rgba(245,245,247,0.6)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500" text-anchor="middle">Info</text>

    <!-- Bottom tab bar -->
    <rect x="12" y="676" width="336" height="32" fill="rgba(0,0,0,0.4)"/>
    <rect x="60" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="120" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="168" y="684" width="24" height="4" rx="2" fill="rgba(88,86,214,0.6)"/>
    <rect x="216" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="276" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
