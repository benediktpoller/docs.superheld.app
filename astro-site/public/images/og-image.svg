<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="shieldGr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(600, 220)">
    <path d="M0-90C-32-90-55-70-55-50c0 42 55 90 55 90s55-48 55-90c0-20-23-40-55-40z" fill="url(#shieldGr)" opacity="0.15"/>
    <path d="M0-70C-24-70-42-56-42-40c0 32 42 70 42 70s42-38 42-70c0-16-18-30-42-30z" fill="url(#shieldGr)"/>
    <path d="M-12 5l9 9 18-22" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Title -->
  <text x="600" y="370" fill="#f8fafc" font-family="-apple-system,system-ui,Inter,sans-serif" font-size="56" font-weight="700" text-anchor="middle" letter-spacing="-2">superheld.app</text>

  <!-- Subtitle -->
  <text x="600" y="420" fill="rgba(248,250,252,0.6)" font-family="-apple-system,system-ui,Inter,sans-serif" font-size="24" font-weight="400" text-anchor="middle">Dein digitaler Schutzschild</text>

  <!-- Tags -->
  <g transform="translate(600, 480)">
    <rect x="-280" y="-16" width="120" height="32" rx="16" fill="rgba(37,99,235,0.2)"/>
    <text x="-220" y="6" fill="rgba(147,197,253,0.9)" font-family="-apple-system,system-ui,Inter,sans-serif" font-size="14" font-weight="500" text-anchor="middle">Privatsphäre</text>

    <rect x="-130" y="-16" width="120" height="32" rx="16" fill="rgba(16,185,129,0.2)"/>
    <text x="-70" y="6" fill="rgba(110,231,183,0.9)" font-family="-apple-system,system-ui,Inter,sans-serif" font-size="14" font-weight="500" text-anchor="middle">Sicherheit</text>

    <rect x="20" y="-16" width="120" height="32" rx="16" fill="rgba(168,85,247,0.2)"/>
    <text x="80" y="6" fill="rgba(216,180,254,0.9)" font-family="-apple-system,system-ui,Inter,sans-serif" font-size="14" font-weight="500" text-anchor="middle">Familie</text>

    <rect x="170" y="-16" width="120" height="32" rx="16" fill="rgba(245,158,11,0.2)"/>
    <text x="230" y="6" fill="rgba(253,224,71,0.9)" font-family="-apple-system,system-ui,Inter,sans-serif" font-size="14" font-weight="500" text-anchor="middle">Open Source</text>
  </g>

  <!-- Bottom bar -->
  <rect y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="616" fill="rgba(248,250,252,0.4)" font-family="-apple-system,system-ui,Inter,sans-serif" font-size="14" text-anchor="middle">docs.superheld.app</text>
