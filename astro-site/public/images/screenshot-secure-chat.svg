<svg width="360" height="720" viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenBgChat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <clipPath id="screenClipChat">
      <rect x="12" y="12" width="336" height="696" rx="28"/>
    </clipPath>
  </defs>
  <rect width="360" height="720" rx="40" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <g clip-path="url(#screenClipChat)">
    <rect x="12" y="12" width="336" height="696" fill="url(#screenBgChat)"/>
    <!-- Status bar -->
    <rect x="12" y="12" width="336" height="44" fill="rgba(0,0,0,0.3)"/>
    <text x="32" y="40" fill="rgba(255,255,255,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="500">9:41</text>
    <text x="310" y="40" fill="rgba(255,255,255,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="500" text-anchor="end">100%</text>
    <rect x="120" y="12" width="120" height="28" rx="14" fill="#000"/>

    <!-- Header -->
    <text x="50" y="86" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" letter-spacing="-0.3">Sichere Quelle</text>
    <text x="30" y="86" fill="rgba(245,245,247,0.5)" font-family="-apple-system,system-ui,sans-serif" font-size="18">&#8592;</text>
    <!-- E2E badge -->
    <rect x="192" y="70" width="138" height="22" rx="11" fill="rgba(52,199,89,0.1)"/>
    <rect x="202" y="77" width="6" height="9" rx="1.5" fill="#34c759"/>
    <rect x="203" y="74" width="4" height="4" rx="2" fill="none" stroke="#34c759" stroke-width="1"/>
    <text x="216" y="85" fill="#34c759" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="500">E2E-verschlüsselt</text>
    <line x1="30" y1="102" x2="330" y2="102" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Auto-delete banner -->
    <rect x="80" y="112" width="200" height="26" rx="13" fill="rgba(255,149,0,0.1)"/>
    <text x="180" y="129" fill="#ff9500" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="500" text-anchor="middle">Auto-Delete: 28 Tage verbleibend</text>

    <!-- Message from source -->
    <rect x="30" y="154" width="220" height="72" rx="16" fill="rgba(255,255,255,0.08)"/>
    <rect x="30" y="210" width="0" height="0"/>
    <text x="46" y="176" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Ich habe die Dokumente</text>
    <text x="46" y="194" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">zur Finanzierung. Vertraulich</text>
    <text x="46" y="212" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">behandeln.</text>
    <text x="230" y="218" fill="rgba(245,245,247,0.2)" font-family="-apple-system,system-ui,sans-serif" font-size="10" text-anchor="end">14:02</text>

    <!-- Attachment from source -->
    <rect x="30" y="236" width="200" height="52" rx="12" fill="rgba(88,86,214,0.1)"/>
    <rect x="42" y="248" width="28" height="28" rx="6" fill="rgba(88,86,214,0.2)"/>
    <text x="56" y="267" fill="#a78bfa" font-family="-apple-system,system-ui,sans-serif" font-size="14" text-anchor="middle">PDF</text>
    <text x="80" y="262" fill="rgba(245,245,247,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="500">bericht-intern.pdf</text>
    <text x="80" y="278" fill="rgba(245,245,247,0.3)" font-family="-apple-system,system-ui,sans-serif" font-size="10">2.4 MB, verschlüsselt</text>

    <!-- My reply -->
    <rect x="110" y="306" width="220" height="52" rx="16" fill="rgba(88,86,214,0.25)"/>
    <text x="126" y="328" fill="rgba(245,245,247,0.9)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Erhalten. Wird nur intern</text>
    <text x="126" y="346" fill="rgba(245,245,247,0.9)" font-family="-apple-system,system-ui,sans-serif" font-size="13">im Research-Team geteilt.</text>
    <text x="314" y="350" fill="rgba(245,245,247,0.2)" font-family="-apple-system,system-ui,sans-serif" font-size="10" text-anchor="end">14:05</text>

    <!-- Source reply -->
    <rect x="30" y="376" width="240" height="72" rx="16" fill="rgba(255,255,255,0.08)"/>
    <text x="46" y="398" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Wichtig: Mein Name darf</text>
    <text x="46" y="416" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">unter keinen Umständen</text>
    <text x="46" y="434" fill="rgba(245,245,247,0.8)" font-family="-apple-system,system-ui,sans-serif" font-size="13">genannt werden.</text>
    <text x="250" y="438" fill="rgba(245,245,247,0.2)" font-family="-apple-system,system-ui,sans-serif" font-size="10" text-anchor="end">14:07</text>

    <!-- My reply 2 -->
    <rect x="110" y="464" width="220" height="72" rx="16" fill="rgba(88,86,214,0.25)"/>
    <text x="126" y="486" fill="rgba(245,245,247,0.9)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Selbstverständlich. Plausible</text>
    <text x="126" y="504" fill="rgba(245,245,247,0.9)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Deniability ist aktiv. Chat</text>
    <text x="126" y="522" fill="rgba(245,245,247,0.9)" font-family="-apple-system,system-ui,sans-serif" font-size="13">wird in 28 Tagen gelöscht.</text>
    <text x="314" y="526" fill="rgba(245,245,247,0.2)" font-family="-apple-system,system-ui,sans-serif" font-size="10" text-anchor="end">14:08</text>

    <!-- Encryption info -->
    <rect x="60" y="556" width="240" height="24" rx="12" fill="rgba(52,199,89,0.06)"/>
    <text x="180" y="572" fill="rgba(52,199,89,0.5)" font-family="-apple-system,system-ui,sans-serif" font-size="10" text-anchor="middle">Kein Tracking, keine Metadaten gespeichert</text>

    <!-- Input field -->
    <rect x="30" y="600" width="246" height="42" rx="21" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="50" y="626" fill="rgba(245,245,247,0.25)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Nachricht schreiben...</text>
    <rect x="286" y="604" width="34" height="34" rx="17" fill="rgba(88,86,214,0.3)"/>
    <text x="303" y="626" fill="#a78bfa" font-family="-apple-system,system-ui,sans-serif" font-size="16" text-anchor="middle">&#8593;</text>

    <!-- Bottom tab bar -->
    <rect x="12" y="676" width="336" height="32" fill="rgba(0,0,0,0.4)"/>
    <rect x="60" y="684" width="24" height="4" rx="2" fill="rgba(88,86,214,0.6)"/>
    <rect x="120" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="216" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="276" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>
</svg>
