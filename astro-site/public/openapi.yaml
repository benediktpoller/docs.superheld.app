openapi: "3.1.0"
info:
  title: Superheld API
  version: "1.0.0-draft"
  description: |
    REST API for the Superheld digital protection platform.

    **Contract status:** This specification is a draft pending engineering
    confirmation via `API_FACTS.md`. Endpoints and schemas without TODO
    markers are documented across multiple pages and considered stable.
    Endpoints marked "unconfirmed" may change or be removed.

    **Non-hallucination policy:** Only endpoints and fields that appear in
    documentation are included. Unknown items are omitted or marked TODO.
  contact:
    name: Superheld Security Team
    email: security@superheld.app
  license:
    name: Proprietary

servers:
  - url: https://api.superheld.app/api/v1
    description: Production
  # TODO-ENG-036: Confirm staging/sandbox environment URLs

security:
  - apiKey: []

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: |
        API key authentication. Pass the key as a Bearer token.
        Production keys: `sh_live_*`. Test keys: `sh_test_*`.
        Rotate every 90 days (30 days in security-critical environments).
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.superheld.app/authorize
          tokenUrl: https://auth.superheld.app/token
          scopes:
            devices:read: List and read devices
            devices:write: Register and configure devices
            threats:read: List and read threats
            alerts:read: View notification rules
            alerts:write: Create and modify notification rules
            scan:execute: Submit content for analysis
            events:read: Read event stream (SIEM integration)
            # TODO-ENG-041: Confirm additional scopes (events:write, policies:*, family:*)
        clientCredentials:
          tokenUrl: https://auth.superheld.app/token
          scopes:
            devices:read: List and read devices
            threats:read: List and read threats
            events:read: Read event stream
            alerts:read: View notification rules

  parameters:
    cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor from previous response
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        # TODO-ENG-042: Confirm default and maximum page sizes
      description: Number of items per page

  schemas:
    ThreatCategory:
      type: string
      enum:
        - phone_scam
        - social_engineering
        - malicious_app
        - phishing
        - remote_control
        - deepfake

    Severity:
      type: string
      enum: [low, medium, high, critical]

    ActionTaken:
      type: string
      enum: [allow, warn, block]

    Device:
      type: object
      required: [device_id, platform, agent_version, last_seen, status]
      properties:
        device_id:
          type: string
          description: "Unique device identifier. Format: `dev_...`"
          example: "dev_3c8a1f"
        platform:
          type: string
          enum: [ios, android, windows, macos, linux]
        agent_version:
          type: string
          example: "2.4.1"
        last_seen:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, inactive, quarantined]
        name:
          type: string
          description: User-assigned display name

    Threat:
      type: object
      required: [threat_id, threat_category, confidence, severity, device_id, detected_at, status]
      properties:
        threat_id:
          type: string
          description: "Unique threat identifier. Format: `thr_...`"
          example: "thr_8f3a2b"
        threat_category:
          $ref: "#/components/schemas/ThreatCategory"
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          example: 0.92
        severity:
          $ref: "#/components/schemas/Severity"
        device_id:
          type: string
          example: "dev_3c8a1f"
        detected_at:
          type: string
          format: date-time
        description:
          type: string
        indicators:
          type: array
          items:
            type: string
          description: IOCs (SHA-256 hashes, signature IDs)
        status:
          type: string
          enum: [active, resolved, dismissed]

    Event:
      type: object
      required: [event_id, timestamp, device_id, threat_category, confidence, action_taken, policy_id, severity]
      properties:
        event_id:
          type: string
          description: "Unique event identifier. Format: `evt_...`"
          example: "evt_7f2a9c"
        timestamp:
          type: string
          format: date-time
        device_id:
          type: string
        threat_category:
          $ref: "#/components/schemas/ThreatCategory"
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
        action_taken:
          $ref: "#/components/schemas/ActionTaken"
        policy_id:
          type: string
          description: "Format: `pol_...`"
        severity:
          $ref: "#/components/schemas/Severity"
        description:
          type: string
        indicators:
          type: array
          items:
            type: string
        metadata:
          $ref: "#/components/schemas/EventMetadata"

    EventMetadata:
      type: object
      properties:
        agent_version:
          type: string
          example: "2.4.1"
        model_version:
          type: string
          example: "detect-v3.2"
        device_platform:
          type: string
          enum: [ios, android, windows, macos, linux]
        tenant_id:
          type: string
          description: "Organization identifier. Format: `org_...`"
          example: "org_5e9d2a"

    AlertRule:
      type: object
      required: [alert_id, name, channel]
      properties:
        alert_id:
          type: string
        name:
          type: string
        severity_filter:
          type: array
          items:
            $ref: "#/components/schemas/Severity"
        channel:
          type: string
          enum: [webhook, email, push, siem]
        webhook_url:
          type: string
          format: uri
        status:
          type: string
          enum: [active, paused]

    AlertRuleCreate:
      type: object
      required: [name, channel]
      properties:
        name:
          type: string
          example: "Kritische Bedrohungen"
        severity_filter:
          type: array
          items:
            $ref: "#/components/schemas/Severity"
          example: [high, critical]
        channel:
          type: string
          enum: [webhook, email, push, siem]
        webhook_url:
          type: string
          format: uri
          description: Required when channel is "webhook"

    ScanResult:
      type: object
      required: [scan_id, status, threat_detected]
      properties:
        scan_id:
          type: string
          description: "Format: `scn_...`"
          example: "scn_4e7d1c"
        status:
          type: string
          enum: [completed, pending, error]
        threat_detected:
          type: boolean
        threat_type:
          $ref: "#/components/schemas/ThreatCategory"
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
        details:
          type: string

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, status]
          properties:
            code:
              type: string
              example: "insufficient_scope"
            message:
              type: string
              example: "Scope 'threats:read' required for this endpoint."
            status:
              type: integer
              example: 403

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "invalid_parameter"
              message: "Parameter 'limit' must be between 1 and 100."
              status: 400
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "unauthorized"
              message: "Invalid or expired API key."
              status: 401
    RateLimited:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
            description: Unix timestamp when the rate limit window resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "rate_limited"
              message: "Rate limit exceeded. Retry after X-RateLimit-Reset."
              status: 429

paths:
  # ──────────────────────────────────────────────────────────────
  # CONFIRMED ENDPOINTS (documented across multiple pages)
  # ──────────────────────────────────────────────────────────────

  /devices:
    get:
      operationId: listDevices
      summary: List registered devices
      description: Returns all devices registered to the authenticated organization.
      tags: [Devices]
      security:
        - apiKey: []
        - oauth2: [devices:read]
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Device"
                  has_more:
                    type: boolean
                  cursor:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /threats:
    get:
      operationId: listThreats
      summary: List detected threats
      description: |
        Derived entity view: latest state per threat, deduplicated.
        For the canonical append-only event stream, use `GET /events`.
      tags: [Threats]
      security:
        - apiKey: []
        - oauth2: [threats:read]
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Filter threats detected after this timestamp (ISO 8601)
        - name: severity
          in: query
          schema:
            $ref: "#/components/schemas/Severity"
        - name: device_id
          in: query
          schema:
            type: string
          description: Filter by device
      responses:
        "200":
          description: List of threats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Threat"
                  has_more:
                    type: boolean
                  cursor:
                    type: string
                  total_count:
                    type: integer
              example:
                data:
                  - threat_id: "thr_8f3a2b"
                    threat_category: "phishing"
                    severity: "high"
                    confidence: 0.92
                    device_id: "dev_3c8a1f"
                    detected_at: "2026-03-14T09:22:17Z"
                    description: "Gefälschte Login-Seite erkannt"
                    status: "active"
                has_more: true
                total_count: 42
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /events:
    get:
      operationId: listEvents
      summary: List detection events
      description: |
        Canonical append-only event stream. Every detection decision (allow,
        warn, block) is recorded as an immutable event. Primary integration
        endpoint for SIEM systems and polling-based integrations.
      tags: [Events]
      security:
        - apiKey: []
        - oauth2: [events:read]
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Filter events after this timestamp (ISO 8601)
        - name: severity
          in: query
          schema:
            $ref: "#/components/schemas/Severity"
        - name: threat_category
          in: query
          schema:
            $ref: "#/components/schemas/ThreatCategory"
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  has_more:
                    type: boolean
                  cursor:
                    type: string
              example:
                data:
                  - event_id: "evt_7f2a9c"
                    timestamp: "2026-03-14T14:32:08Z"
                    device_id: "dev_3c8a1f"
                    threat_category: "phishing"
                    confidence: 0.94
                    action_taken: "block"
                    policy_id: "pol_default"
                    severity: "high"
                    description: "Gefälschte Login-Seite erkannt und blockiert."
                    indicators: ["sha256:a1b2c3d4e5f6..."]
                    metadata:
                      agent_version: "2.4.1"
                      model_version: "detect-v3.2"
                      device_platform: "macos"
                      tenant_id: "org_5e9d2a"
                has_more: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /alerts:
    get:
      operationId: listAlerts
      summary: List notification rules
      tags: [Alerts]
      security:
        - apiKey: []
        - oauth2: [alerts:read]
      responses:
        "200":
          description: List of alert rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AlertRule"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createAlertRule
      summary: Create notification rule
      description: Create a new alert rule. Supports webhook, email, push, and SIEM channels.
      tags: [Alerts]
      security:
        - apiKey: []
        - oauth2: [alerts:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertRuleCreate"
      responses:
        "201":
          description: Alert rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /scan:
    post:
      operationId: submitScan
      summary: Submit content for analysis
      description: Submit a URL or hash for threat analysis.
      tags: [Scan]
      security:
        - apiKey: []
        - oauth2: [scan:execute]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to analyze
                hash:
                  type: string
                  description: SHA-256 hash to check against threat database
              # TODO-ENG-038: Confirm full request schema for /scan
            example:
              url: "https://example-phishing.com/login"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
              example:
                scan_id: "scn_4e7d1c"
                status: "completed"
                threat_detected: true
                threat_type: "phishing"
                confidence: 0.97
                details: "Domain imitiert bekannten Finanzdienstleister. SSL-Zertifikat seit 2 Tagen aktiv."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────────────────────
  # UNCONFIRMED ENDPOINTS (TODO-ENG-038)
  # Documented in api.mdx or configuration.mdx but not yet
  # confirmed by engineering. May change or be removed.
  # ──────────────────────────────────────────────────────────────

  /status:
    get:
      operationId: getStatus
      summary: Get protection status
      description: |
        Returns overall protection status for all devices.
        **Unconfirmed** — only mentioned in configuration.mdx.
      tags: [Status]
      x-status: unconfirmed
      responses:
        "200":
          description: Protection status
          # TODO-ENG-038: Confirm and define response schema

  /rules:
    post:
      operationId: createRule
      summary: Create or modify protection rule
      description: |
        **Unconfirmed** — only mentioned in configuration.mdx.
      tags: [Rules]
      x-status: unconfirmed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # TODO-ENG-038: Define rule schema
      responses:
        "201":
          description: Rule created

  /family:
    get:
      operationId: listFamilyProfiles
      summary: List family profiles
      description: |
        **Unconfirmed** — only mentioned in configuration.mdx.
      tags: [Family]
      x-status: unconfirmed
      responses:
        "200":
          description: Family profiles
          # TODO-ENG-038: Define response schema

  /whitelist:
    post:
      operationId: addWhitelistEntry
      summary: Add whitelist entry
      description: |
        **Unconfirmed** — only mentioned in configuration.mdx.
      tags: [Whitelist]
      x-status: unconfirmed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # TODO-ENG-038: Define whitelist entry schema
      responses:
        "201":
          description: Entry created

  /report:
    post:
      operationId: generateReport
      summary: Generate threat report
      description: |
        **Unconfirmed** — only mentioned in configuration.mdx.
      tags: [Reports]
      x-status: unconfirmed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # TODO-ENG-038: Define report request schema
      responses:
        "200":
          description: Generated report
          # TODO-ENG-038: Confirm format (JSON, PDF)
