baseURL: https://docs.superheld.app/
languageCode: de
defaultContentLanguage: de
title: superheld.app
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

# Navigation
menu:
  main:
    - name: Dokumentation
      pageRef: /docs
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: GitHub
      weight: 3
      url: https://github.com/benediktpoller/docs.superheld.app
      params:
        icon: github
    - name: Theme Toggle
      weight: 4
      params:
        type: theme-toggle
  sidebar:
    - name: superheld.app
      url: https://superheld.app
      weight: 1
    - name: Support
      url: https://superheld.app/support
      weight: 2

# Theme params
params:
  navbar:
    displayTitle: true
    displayLogo: false
    width: normal

  theme:
    default: system
    displayToggle: true

  page:
    width: normal

  editURL:
    enable: true
    base: https://github.com/benediktpoller/docs.superheld.app/edit/main/hugo-site/content

  footer:
    width: normal

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  displayUpdatedDate: true

# Allow raw HTML in markdown
markup:
  goldmark:
    renderer:
      unsafe: true
