      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="vpnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5856d6"/>
      <stop offset="100%" stop-color="#af52de"/>
    </linearGradient>
    <clipPath id="screenClip2">
      <rect x="12" y="12" width="336" height="696" rx="28"/>
    </clipPath>
  </defs>
  <rect width="360" height="720" rx="40" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <g clip-path="url(#screenClip2)">
    <rect x="12" y="12" width="336" height="696" fill="url(#screenBg2)"/>
    <!-- Status bar -->
    <rect x="12" y="12" width="336" height="44" fill="rgba(0,0,0,0.3)"/>
    <text x="32" y="40" fill="rgba(255,255,255,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="500">9:41</text>
    <text x="310" y="40" fill="rgba(255,255,255,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="500" text-anchor="end">VPN</text>
    <rect x="120" y="12" width="120" height="28" rx="14" fill="#000"/>
    <!-- Header -->
    <text x="30" y="86" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="600" letter-spacing="-0.3">VPN & Netzwerk</text>
    <line x1="30" y1="102" x2="330" y2="102" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- VPN Connection Circle -->
    <circle cx="180" cy="210" r="70" fill="none" stroke="rgba(88,86,214,0.2)" stroke-width="4"/>
    <circle cx="180" cy="210" r="70" fill="none" stroke="url(#vpnGrad)" stroke-width="4" stroke-dasharray="440" stroke-dashoffset="0" stroke-linecap="round"/>
    <circle cx="180" cy="210" r="55" fill="rgba(88,86,214,0.08)"/>
    <!-- Lock icon -->
    <rect x="170" y="196" width="20" height="16" rx="3" fill="#a78bfa"/>
    <rect x="173" y="188" width="14" height="12" rx="7" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="180" y="238" fill="#a78bfa" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">VERBUNDEN</text>

    <!-- Connection Info -->
    <rect x="30" y="310" width="300" height="72" rx="16" fill="rgba(255,255,255,0.06)"/>
    <text x="50" y="338" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500">STANDORT</text>
    <text x="50" y="364" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="500">Zürich, Schweiz</text>
    <text x="306" y="350" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="24" text-anchor="end">🇨🇭</text>

    <!-- Stats -->
    <rect x="30" y="398" width="144" height="72" rx="16" fill="rgba(255,255,255,0.06)"/>
    <text x="50" y="426" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500">DOWNLOAD</text>
    <text x="50" y="454" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="700">94 <tspan font-size="12" font-weight="400" fill="rgba(245,245,247,0.5)">Mbit/s</tspan></text>

    <rect x="186" y="398" width="144" height="72" rx="16" fill="rgba(255,255,255,0.06)"/>
    <text x="206" y="426" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500">UPLOAD</text>
    <text x="206" y="454" fill="#f5f5f7" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="700">42 <tspan font-size="12" font-weight="400" fill="rgba(245,245,247,0.5)">Mbit/s</tspan></text>

    <!-- Protocol & Encryption -->
    <text x="30" y="510" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="0.5">DETAILS</text>

    <rect x="30" y="524" width="300" height="44" rx="12" fill="rgba(255,255,255,0.04)"/>
    <text x="50" y="551" fill="rgba(245,245,247,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Protokoll</text>
    <text x="306" y="551" fill="rgba(245,245,247,0.4)" font-family="-apple-system,system-ui,sans-serif" font-size="13" text-anchor="end">WireGuard</text>

    <rect x="30" y="576" width="300" height="44" rx="12" fill="rgba(255,255,255,0.04)"/>
    <text x="50" y="603" fill="rgba(245,245,247,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13">Verschlüsselung</text>
    <text x="306" y="603" fill="#34c759" font-family="-apple-system,system-ui,sans-serif" font-size="13" text-anchor="end">AES-256</text>

    <rect x="30" y="628" width="300" height="44" rx="12" fill="rgba(255,255,255,0.04)"/>
    <text x="50" y="655" fill="rgba(245,245,247,0.7)" font-family="-apple-system,system-ui,sans-serif" font-size="13">DNS-Leak-Schutz</text>
    <circle cx="298" cy="650" r="5" fill="#34c759"/>

    <!-- Bottom tab bar -->
    <rect x="12" y="676" width="336" height="32" fill="rgba(0,0,0,0.4)"/>
    <rect x="60" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="120" y="684" width="24" height="4" rx="2" fill="rgba(88,86,214,0.6)"/>
    <rect x="216" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="276" y="684" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
