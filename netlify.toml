# Netlify configuration for superheld.app documentation
# Build root is the Hugo site in `hugo-site/`.

[build]
  base = "hugo-site"
  command = "npm ci && npm run build:production"
  publish = "public"

[build.environment]
  # Pin a stable Hugo version if needed (npm uses hugo-extended)
  # HUGO_VERSION = "0.157.0"

[context.production.environment]
  # Optional: force HTTPS in redirects, etc.
  # HUGO_BASEURL = "https://docs.superheld.app/"
